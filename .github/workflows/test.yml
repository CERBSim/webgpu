name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/Dockerfile.base
          tags: webgpu-base
          load: true
          cache-from: type=gha,scope=webgpu-base
          cache-to: type=gha,mode=max,scope=webgpu-base

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/Dockerfile
          build-args: BASE_IMAGE=webgpu-base
          tags: webgpu-tests
          load: true
          cache-from: type=gha,scope=webgpu-tests
          cache-to: type=gha,mode=max,scope=webgpu-tests

      - name: Run tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests/output:/app/tests/output \
            webgpu-tests

      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: tests/output/