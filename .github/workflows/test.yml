name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  packages: write

env:
  BASE_IMAGE: ghcr.io/cerbsim/webgpu-base

jobs:
  base-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/Dockerfile.base
          tags: ${{ env.BASE_IMAGE }}:latest
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          cache-from: |
            type=registry,ref=${{ env.BASE_IMAGE }}:latest
            type=gha,scope=webgpu-base
          cache-to: type=gha,mode=max,scope=webgpu-base

  test:
    needs: base-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/Dockerfile.base
          tags: webgpu-base
          load: true
          cache-from: |
            type=registry,ref=${{ env.BASE_IMAGE }}:latest
            type=gha,scope=webgpu-base

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/Dockerfile
          build-args: BASE_IMAGE=webgpu-base
          tags: webgpu-tests
          load: true
          cache-from: type=gha,scope=webgpu-tests
          cache-to: type=gha,mode=max,scope=webgpu-tests

      - name: Run tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests/output:/app/tests/output \
            webgpu-tests

      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: tests/output/